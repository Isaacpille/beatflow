name: BeatFlow Premium Build (Diagnostic)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze_and_build:
    name: Analyze and Build
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flutter 
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2'

      - name: Get dependencies
        run: flutter pub get

      - name: Run Analyze 
        run: flutter analyze
        continue-on-error: false

      - name: Fix macOS permissions
        run: |
          xattr -rd com.apple.FinderInfo . || true

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Build iOS - precache Flutter engine
        run: flutter precache --ios

      - name: Build iOS - pod install
        run: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod install --repo-update
          cd ..

      - name: Build iOS IPA
        run: flutter build ios --release --no-codesign
        # NO --verbose: keeps logs readable so we can see actual errors

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BeatFlow-Builds
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/ios/iphoneos/Runner.app
