name: BeatFlow Premium Build (Diagnostic)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze_and_build:
    name: Analyze and Build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Flutter 
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2'

      - name: Get dependencies
        run: flutter pub get

      - name: Run Analyze 
        run: flutter analyze
        continue-on-error: false

      - name: Fix macOS permissions & Xcode Surgery
        run: |
          xattr -rd com.apple.FinderInfo . || true
          sed -i '' '/baseConfigurationReference/d' ios/Runner.xcodeproj/project.pbxproj

      - name: Build Android APK
        run: flutter build apk --debug --verbose

      - name: Build iOS IPA 
        run: |
          # Aggressive cleanup as per deep analysis
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          rm -rf .symlinks
          rm -rf Flutter/Flutter.framework
          rm -rf Flutter/Flutter.podspec
          cd ..
          flutter clean
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..
          flutter build ios --release --no-codesign --verbose

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BeatFlow-Builds
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/ios/iphoneos/Runner.app
